<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOCHK 预约监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333;min-height:100vh}
.header{background:#1a3a5c;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px;font-weight:600}
.status-bar{font-size:13px;opacity:.9;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.status-dot.ok{background:#4caf50}
.status-dot.err{background:#f44336}
.status-dot.wait{background:#ff9800}
.status-dot.paused{background:#9e9e9e}
.btn-pause{background:none;border:1px solid rgba(255,255,255,.45);color:#fff;padding:2px 10px;border-radius:4px;font-size:12px;cursor:pointer}
.btn-pause.active{background:rgba(255,255,255,.2);border-color:#fff}

.tab-bar{background:#fff;padding:10px 24px;border-bottom:1px solid #e0e0e0;display:flex;gap:8px}
.tab-btn{padding:8px 14px;border:1px solid #d0d9e2;border-radius:999px;background:#f7fafc;color:#516273;font-size:13px;font-weight:600;cursor:pointer}
.tab-btn.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.tab-section{display:none}
.tab-section.active{display:block}

.filters{background:#fff;padding:12px 24px;border-bottom:1px solid #e0e0e0;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:12px;color:#666;font-weight:600;text-transform:uppercase}
.filter-group input[type=text]{padding:6px 10px;border:1px solid #d0d0d0;border-radius:4px;font-size:13px;width:min(100%,240px)}
.chip-container{display:flex;flex-wrap:wrap;gap:4px;max-width:640px}
.chip{padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;border:1px solid #d0d0d0;background:#fff;user-select:none}
.chip.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.chip.full{background:#f5f5f5;color:#bbb;border-color:#e8e8e8}
.chip .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot-avail{background:#4caf50}
.dot-full{background:#e0e0e0}
.placeholder{font-size:12px;color:#999;padding:4px 0}

.content{padding:24px}
.no-data{text-align:center;padding:72px 20px;color:#999;font-size:16px}
.date-section{margin-bottom:24px}
.date-title{font-size:15px;font-weight:700;margin-bottom:10px;color:#18344f;display:flex;align-items:center;gap:8px}
.date-title .badge{padding:2px 8px;border-radius:8px;font-size:11px;font-weight:normal}
.badge-avail{background:#e8f5e9;color:#2e7d32}
.badge-full{background:#f5f5f5;color:#999}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
table{width:100%;min-width:540px;border-collapse:collapse;background:#fff;font-size:13px}
th{background:#f0f4f8;color:#555;font-weight:600;padding:8px 12px;text-align:center;white-space:nowrap;border-bottom:2px solid #e0e0e0;position:sticky;top:0}
th:first-child{text-align:left;min-width:220px}
td{padding:6px 12px;text-align:center;border-bottom:1px solid #f0f0f0;white-space:nowrap}
td:first-child{text-align:left;font-weight:500}
.branch-cell{display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.branch-name{font-weight:700;color:#1a3a5c}
.branch-meta{font-size:11px;color:#666;line-height:1.5}
.branch-links a{color:#1d62c6;text-decoration:none}
.branch-links a:hover{text-decoration:underline}
.cell-a{background:#e8f5e9;color:#2e7d32;font-weight:700}
.cell-a .cell-mark{display:block}
.cell-a .cell-first-seen{display:block;margin-top:2px;font-size:10px;font-weight:500;color:#5d7a67}
.cell-f{color:#bbb;font-size:11px}
.cell-empty{color:#e0e0e0}

.history-wrap{padding:16px 24px 24px}
.history-grid{display:grid;grid-template-columns:1fr;gap:16px}
.history-panel{background:#fff;border:1px solid #e3eaf1;border-radius:14px;padding:16px;box-shadow:0 10px 24px rgba(26,58,92,.05)}
.panel-title{font-size:15px;font-weight:700;color:#18344f;margin-bottom:12px}
.day-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.day-card{background:#f8fbfd;border:1px solid #e4edf5;border-radius:12px;padding:12px}
.day-card-date{font-size:12px;color:#677789;font-weight:700;margin-bottom:8px}
.day-card-row{font-size:12px;color:#5c6d80;display:flex;justify-content:space-between;gap:8px}

.batch-list{display:flex;flex-direction:column;gap:10px}
.batch-card{border:1px solid #e4edf5;border-radius:12px;padding:12px;background:#fcfdff}
.batch-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:8px}
.batch-time{font-size:12px;color:#7f8fa2;white-space:nowrap}
.batch-summary{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;font-weight:700}
.batch-plus{color:#2e7d32}
.batch-minus{color:#c62828}
.batch-section{margin-top:8px}
.batch-section-title{font-size:12px;font-weight:700;color:#425466;margin-bottom:4px}
.batch-items{display:flex;flex-direction:column;gap:4px}
.batch-item{font-size:12px;color:#334a61;line-height:1.4}
.batch-item a{color:#1d62c6;text-decoration:none;margin-left:4px}
.batch-item a:hover{text-decoration:underline}

.pagination{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px}
.pagination-info{font-size:12px;color:#6f8093}
.pagination-actions{display:flex;gap:8px;align-items:center}
.page-btn{padding:6px 10px;border:1px solid #d0d9e2;border-radius:8px;background:#f7fafc;color:#516273;font-size:12px;font-weight:600;cursor:pointer}
.page-btn:disabled{opacity:.45;cursor:not-allowed}

.branch-tab-toolbar{background:#fff;padding:16px 24px;border-bottom:1px solid #e0e0e0}
.catalog-wrap{padding:16px 24px 24px}
.catalog-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}
.catalog-item{padding:12px;border-radius:12px;background:#fff;border:1px solid #e4edf5;display:grid;gap:8px}
.catalog-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.catalog-name{font-size:14px;font-weight:700;color:#1a3a5c}
.catalog-code{font-size:12px;color:#7f8fa2}
.catalog-meta{font-size:12px;color:#5c6d80;line-height:1.5;display:grid;gap:2px}
.catalog-badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.catalog-badge.enabled{background:#e8f5e9;color:#2e7d32}
.catalog-badge.disabled{background:#ffebee;color:#c62828}
.catalog-actions a{color:#1d62c6;text-decoration:none;font-size:12px}

.summary{padding:12px 24px;background:#fff;border-top:1px solid #e0e0e0;font-size:12px;color:#888;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

@media (max-width: 768px){
  body{font-size:14px}
  .header{padding:14px 16px;align-items:flex-start}
  .tab-bar{padding:10px 16px}
  .filters{padding:12px 16px;gap:12px;flex-direction:column}
  .content,.history-wrap,.catalog-wrap{padding:16px}
  .branch-tab-toolbar{padding:12px 16px}
  .filter-group{width:100%}
  .filter-group input[type=text]{width:100%}
  .catalog-list{grid-template-columns:1fr}
  .summary{padding:12px 16px;flex-direction:column;align-items:flex-start}
}
@media (max-width: 480px){
  .header{padding:12px}
  .tab-bar{padding:10px 12px;overflow:auto}
  .filters{padding:10px 12px}
  .content,.history-wrap,.catalog-wrap{padding:12px}
  .branch-tab-toolbar{padding:10px 12px}
  .summary{padding:10px 12px}
}
</style>
</head>
<body>
<div class="header">
  <h1>BOCHK 预约监控</h1>
  <div class="status-bar">
    <span><span class="status-dot wait" id="statusDot"></span><span id="statusText">连接中...</span></span>
    <span id="checksInfo"></span>
    <span id="updatedAt"></span>
    <span id="lastReleaseAt"></span>
    <button class="btn-pause" id="btnPause" onclick="togglePause()">暂停刷新</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tabBtnMonitor" onclick="switchTab('monitor')">监控概览</button>
  <button class="tab-btn" id="tabBtnHistory" onclick="switchTab('history')">历史记录</button>
  <button class="tab-btn" id="tabBtnBranches" onclick="switchTab('branches')">分行目录</button>
</div>

<div class="tab-section active" id="monitorTab">
  <div class="filters">
    <div class="filter-group">
      <label>日期</label>
      <div class="chip-container" id="dateFilters"><span class="placeholder">等待数据...</span></div>
    </div>
    <div class="filter-group">
      <label>时间段</label>
      <div class="chip-container" id="timeFilters"><span class="placeholder">等待数据...</span></div>
    </div>
    <div class="filter-group">
      <label>分行搜索</label>
      <input type="text" id="branchSearch" placeholder="输入当前可约分行搜索...">
    </div>
  </div>
  <div class="content" id="content">
    <div class="no-data">正在获取数据...</div>
  </div>
</div>

<div class="tab-section" id="historyTab">
  <div class="history-wrap">
    <div class="history-grid">
      <div class="history-panel">
        <div class="panel-title">近 7 天放号统计</div>
        <div class="day-stats" id="dayStats"></div>
      </div>
      <div class="history-panel">
        <div class="panel-title">最近变化记录（按轮次聚合）</div>
        <div class="batch-list" id="recentBatches"></div>
        <div class="pagination" id="historyPagination"></div>
      </div>
    </div>
  </div>
</div>

<div class="tab-section" id="branchTab">
  <div class="branch-tab-toolbar">
    <div class="filter-group">
      <label>分行搜索</label>
      <input type="text" id="catalogSearch" placeholder="输入分行名称、编号、地址或电话搜索...">
    </div>
  </div>
  <div class="catalog-wrap">
    <div class="catalog-list" id="branchCatalog"></div>
  </div>
</div>

<div class="summary">
  <span id="summaryLeft"></span>
  <span id="summaryRight">自动刷新中 · 按策略动态轮询</span>
</div>

<script>
let DATA = null;
let HISTORY = null;
let BRANCH_CATALOG = [];
let selectedDates = new Set();
let selectedTimes = new Set();
let branchKeyword = '';
let catalogKeyword = '';
let activeTab = 'monitor';
let historyPage = 1;
let paused = false;
let refreshTimer = null;

async function fetchData() {
  if (paused) return;
  try {
    const [statusResp, historyResp] = await Promise.all([
      fetch('/api/status'),
      fetch('/api/history?page=' + historyPage),
    ]);
    const branchResp = await fetch('/api/branches');
    if (!statusResp.ok) throw new Error('HTTP ' + statusResp.status);
    DATA = await statusResp.json();
    HISTORY = historyResp.ok ? await historyResp.json() : null;
    historyPage = (HISTORY && HISTORY.recent_batches_pagination && HISTORY.recent_batches_pagination.page) || 1;
    BRANCH_CATALOG = branchResp.ok ? await branchResp.json() : [];

    updateStatus(true);
    renderFilters();
    renderTable();
    renderHistory();
    renderBranchCatalog();
    switchTab(activeTab, true);
  } catch (e) {
    updateStatus(false, e.message);
  }
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btnPause');
  const dot = document.getElementById('statusDot');
  const right = document.getElementById('summaryRight');
  if (paused) {
    btn.textContent = '恢复刷新';
    btn.classList.add('active');
    dot.className = 'status-dot paused';
    right.textContent = '已暂停刷新';
  } else {
    btn.textContent = '暂停刷新';
    btn.classList.remove('active');
    right.textContent = '自动刷新中 · 按策略动态轮询';
    fetchData();
  }
}

function switchTab(tab, silent) {
  activeTab = tab;
  const isMonitor = tab === 'monitor';
  const isHistory = tab === 'history';
  const isBranches = tab === 'branches';
  document.getElementById('monitorTab').classList.toggle('active', isMonitor);
  document.getElementById('historyTab').classList.toggle('active', isHistory);
  document.getElementById('branchTab').classList.toggle('active', isBranches);
  document.getElementById('tabBtnMonitor').classList.toggle('active', isMonitor);
  document.getElementById('tabBtnHistory').classList.toggle('active', isHistory);
  document.getElementById('tabBtnBranches').classList.toggle('active', isBranches);

  if (!silent) {
    renderTable();
    renderHistory();
    renderBranchCatalog();
  }

  if (isHistory) {
    const today = (HISTORY && HISTORY.today) || { appeared_count: 0, disappeared_count: 0 };
    document.getElementById('summaryLeft').textContent = '今日 +' + (today.appeared_count || 0) + ' / -' + (today.disappeared_count || 0);
  } else if (isBranches) {
    document.getElementById('summaryLeft').textContent = ((BRANCH_CATALOG || []).length) + ' 个分行';
  } else {
    renderTable();
  }
}

function updateStatus(ok, err) {
  if (paused) return;
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const checks = document.getElementById('checksInfo');
  const updated = document.getElementById('updatedAt');
  const lastRelease = document.getElementById('lastReleaseAt');
  if (!ok) {
    dot.className = 'status-dot err';
    text.textContent = '连接失败: ' + (err || '');
    return;
  }
  dot.className = 'status-dot ok';
  text.textContent = DATA.monitoring ? '监控中' : '已停止';
  checks.textContent = '已检查 ' + DATA.total_checks + ' 次';
  updated.textContent = DATA.updated_at ? ('最后检测: ' + DATA.updated_at) : '';
  lastRelease.textContent = DATA.last_release_at ? ('最后放号: ' + DATA.last_release_at) : '最后放号: 暂无';
}

function escapeHtml(text) {
  return String(text || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function normalizeBranchLabel(branchName) {
  const name = String(branchName || '').trim();
  if (!name) return '分行';
  return name.includes('分行') ? name : (name + '分行');
}

function buildMapUrl(branchName, addressCn) {
  const _ = addressCn;
  const query = '中国银行 ' + normalizeBranchLabel(branchName);
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
}

function parseLocalDateTime(text) {
  if (!text) return null;
  const normalized = String(text).replace(' ', 'T');
  const value = new Date(normalized);
  return Number.isNaN(value.getTime()) ? null : value;
}

function formatDurationShort(totalSeconds) {
  const seconds = Math.max(0, Number(totalSeconds) || 0);
  if (seconds < 60) return seconds + '秒';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return minutes + '分';
  const hours = Math.floor(minutes / 60);
  const remainMinutes = minutes % 60;
  if (hours < 24) return remainMinutes > 0 ? (hours + '时' + remainMinutes + '分') : (hours + '时');
  const days = Math.floor(hours / 24);
  const remainHours = hours % 24;
  return remainHours > 0 ? (days + '天' + remainHours + '时') : (days + '天');
}

function durationSince(firstSeenAt, endAt) {
  const start = parseLocalDateTime(firstSeenAt);
  const end = parseLocalDateTime(endAt) || new Date();
  if (!start || !end) return '';
  const seconds = Math.max(0, Math.floor((end.getTime() - start.getTime()) / 1000));
  return formatDurationShort(seconds);
}

function renderFilters() {
  if (!DATA) return;
  renderDateChips();
  const timeContainer = document.getElementById('timeFilters');
  const times = DATA.time_slots || [];
  if (times.length === 0) {
    timeContainer.innerHTML = '<span class="placeholder">暂无时间段数据</span>';
  } else {
    renderChipGroup('timeFilters', times, selectedTimes, () => renderTable());
  }
}

function renderDateChips() {
  const container = document.getElementById('dateFilters');
  const dateQuota = DATA.date_quota || {};
  const dates = DATA.dates || [];
  if (dates.length === 0) {
    container.innerHTML = '<span class="placeholder">暂无日期数据</span>';
    return;
  }
  container.innerHTML = '';
  dates.forEach(dateStr => {
    const rawKey = dateStr.replace(/-/g, '');
    const status = dateQuota[rawKey] || 'F';
    const chip = document.createElement('span');
    const isActive = selectedDates.size === 0 || selectedDates.has(dateStr);
    chip.className = 'chip' + (isActive ? ' active' : '') + (status === 'F' ? ' full' : '');
    chip.dataset.value = dateStr;
    chip.dataset.raw = rawKey;
    chip.innerHTML = '<span class="dot ' + (status === 'F' ? 'dot-full' : 'dot-avail') + '"></span>' + dateStr;
    chip.onclick = () => {
      if (selectedDates.has(dateStr)) selectedDates.delete(dateStr);
      else selectedDates.add(dateStr);
      if (selectedDates.size === dates.length) selectedDates.clear();
      renderDateChips();
      renderTable();
    };
    container.appendChild(chip);
  });
}

function renderChipGroup(containerId, items, selectedSet, onChange) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  items.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'chip' + ((selectedSet.size === 0 || selectedSet.has(item)) ? ' active' : '');
    chip.textContent = item;
    chip.dataset.value = item;
    chip.onclick = () => {
      if (selectedSet.has(item)) selectedSet.delete(item);
      else selectedSet.add(item);
      if (selectedSet.size === items.length) selectedSet.clear();
      onChange();
      renderChipGroup(containerId, items, selectedSet, onChange);
    };
    container.appendChild(chip);
  });
}

function renderTable() {
  const content = document.getElementById('content');
  const summary = document.getElementById('summaryLeft');
  const dateQuota = (DATA && DATA.date_quota) || {};

  if (!DATA || !DATA.dates || DATA.dates.length === 0) {
    content.innerHTML = '<div class="no-data">' + (DATA ? '暂无可预约时段' : '正在获取数据...') + '</div>';
    if (activeTab === 'monitor') summary.textContent = '';
    return;
  }

  const dates = (DATA.dates || []).filter(d => selectedDates.size === 0 || selectedDates.has(d));
  const times = (DATA.time_slots || []).filter(t => selectedTimes.size === 0 || selectedTimes.has(t));
  const keyword = branchKeyword.toLowerCase();
  const branches = (DATA.branches || []).filter(b => {
    const address = (b.address_cn || '').toLowerCase();
    const tel = (b.tel_no || '').toLowerCase();
    if (keyword && !b.name.toLowerCase().includes(keyword) && !b.code.toLowerCase().includes(keyword) && !address.includes(keyword) && !tel.includes(keyword)) return false;
    if (dates.length === 0 && times.length === 0) return true;
    const avail = b.availability || {};
    for (const d of dates) {
      if (!avail[d]) continue;
      for (const t of times) if (avail[d][t]) return true;
    }
    return false;
  });

  let html = '';
  let totalAvailable = 0;
  dates.forEach(date => {
    const rawKey = date.replace(/-/g, '');
    const quotaStatus = dateQuota[rawKey] || 'F';
    const isFull = quotaStatus !== 'A';

    const dateBranches = branches.filter(b => {
      const da = (b.availability || {})[date];
      if (!da) return false;
      return times.some(t => da[t] && da[t].status !== 'F');
    });

    const badgeText = isFull ? '全部约满' : dateBranches.length + ' 个分行可预约';
    html += '<div class="date-section">';
    html += '<div class="date-title">' + date + ' <span class="badge ' + (isFull ? 'badge-full' : 'badge-avail') + '">' + badgeText + '</span></div>';

    if (isFull) {
      html += '<div class="no-data" style="padding:20px;font-size:13px">该日期暂无可预约时段</div>';
    } else if (times.length > 0) {
      html += '<div class="table-wrap"><table><thead><tr><th>分行</th>';
      times.forEach(t => { html += '<th>' + t + '</th>'; });
      html += '</tr></thead><tbody>';

      branches.forEach(b => {
        const da = (b.availability || {})[date] || {};
        const hasAny = times.some(t => da[t]);
        if (!hasAny) return;

        const mapUrl = buildMapUrl(b.name, b.address_cn || '');
        html += '<tr><td><div class="branch-cell"><span class="branch-name">' + escapeHtml(b.name) + '</span><div class="branch-meta"><div>地址：' + escapeHtml(b.address_cn || '暂无地址') + '</div><div>电话：' + escapeHtml(b.tel_no || '暂无电话') + '</div><div class="branch-links"><a href="' + escapeHtml(mapUrl) + '" target="_blank" rel="noopener noreferrer">Google 地图</a></div></div></div></td>';
        times.forEach(t => {
          const cell = da[t];
          if (!cell || !cell.status) {
            html += '<td class="cell-empty">-</td>';
          } else if (cell.status === 'F') {
            html += '<td class="cell-f">满</td>';
          } else {
            const firstSeen = cell.first_seen_at || '';
            const duration = firstSeen ? durationSince(firstSeen, DATA.updated_at) : '';
            html += '<td class="cell-a"><span class="cell-mark">可约</span><span class="cell-first-seen">' + (firstSeen ? ('捕获 ' + escapeHtml((firstSeen.slice(11) || firstSeen)) + (duration ? (' · 已持续 ' + escapeHtml(duration)) : '')) : '') + '</span></td>';
            totalAvailable++;
          }
        });
        html += '</tr>';
      });

      html += '</tbody></table></div>';
    }
    html += '</div>';
  });

  content.innerHTML = html || '<div class="no-data">当前筛选条件下无数据</div>';
  if (activeTab === 'monitor') {
    const parts = [dates.length + ' 个日期', times.length + ' 个时段', branches.length + ' 个分行', totalAvailable + ' 个可约'];
    summary.textContent = parts.join(' · ');
  }
}

function renderHistory() {
  renderDayStats();
  renderRecentBatches();
}

function renderDayStats() {
  const el = document.getElementById('dayStats');
  const days = (HISTORY && HISTORY.recent_days) || [];
  if (days.length === 0) {
    el.innerHTML = '<div class="placeholder">暂无历史统计</div>';
    return;
  }
  el.innerHTML = days.map(day =>
    '<div class="day-card"><div class="day-card-date">' + escapeHtml(day.date) + '</div>'
    + '<div class="day-card-row"><span>新增</span><strong>+' + (day.appeared_count || 0) + '</strong></div>'
    + '<div class="day-card-row"><span>消失</span><strong>-' + (day.disappeared_count || 0) + '</strong></div></div>'
  ).join('');
}

function renderBatchItems(items, limit) {
  if (!items || items.length === 0) return '<div class="placeholder">无</div>';
  const sliced = items.slice(0, limit);
  const lines = sliced.map(item => {
    const duration = item.duration_secs ? ('（存活 ' + formatDurationShort(item.duration_secs) + '）') : '';
    const mapUrl = buildMapUrl(item.branch_name, item.address_cn || '');
    const map = mapUrl ? ('<a href="' + escapeHtml(mapUrl) + '" target="_blank" rel="noopener noreferrer">地图</a>') : '';
    return '<div class="batch-item">' + escapeHtml(item.appointment_date) + ' ' + escapeHtml(item.appointment_time) + ' · ' + escapeHtml(item.branch_name) + duration + ' ' + map + '</div>';
  }).join('');
  const more = items.length > limit ? ('<div class="batch-item">还有 ' + (items.length - limit) + ' 条...</div>') : '';
  return '<div class="batch-items">' + lines + more + '</div>';
}

function renderRecentBatches() {
  const el = document.getElementById('recentBatches');
  const rows = (HISTORY && HISTORY.recent_batches) || [];
  if (rows.length === 0) {
    el.innerHTML = '<div class="placeholder">暂无最近变化</div>';
    renderHistoryPagination(0);
    return;
  }

  el.innerHTML = rows.map(batch => {
    const addedHtml = batch.added_count > 0
      ? '<div class="batch-section"><div class="batch-section-title">新增可预约（' + batch.added_count + '）</div>' + renderBatchItems(batch.added_items, 8) + '</div>'
      : '';
    const removedHtml = batch.removed_count > 0
      ? '<div class="batch-section"><div class="batch-section-title">已不可预约（' + batch.removed_count + '）</div>' + renderBatchItems(batch.removed_items, 8) + '</div>'
      : '';
    return '<div class="batch-card"><div class="batch-head"><div class="batch-summary"><span class="batch-plus">+' + (batch.added_count || 0) + '</span><span class="batch-minus">-' + (batch.removed_count || 0) + '</span></div><span class="batch-time">' + escapeHtml(batch.event_at) + '</span></div>' + addedHtml + removedHtml + '</div>';
  }).join('');

  renderHistoryPagination(rows.length);
}

function renderHistoryPagination(totalRendered) {
  const el = document.getElementById('historyPagination');
  const paging = (HISTORY && HISTORY.recent_batches_pagination) || {
    page: 1, page_size: 10, total_items: totalRendered || 0, total_pages: 0
  };
  const totalItems = Number(paging.total_items || 0);
  const page = Number(paging.page || 1);
  const totalPages = Number(paging.total_pages || 0);
  if (totalItems === 0) {
    el.innerHTML = '';
    return;
  }
  const start = (page - 1) * Number(paging.page_size || 10) + 1;
  const end = Math.min(totalItems, start + Math.max(0, totalRendered - 1));
  const prevDisabled = page <= 1 ? ' disabled' : '';
  const nextDisabled = totalPages <= 1 || page >= totalPages ? ' disabled' : '';
  el.innerHTML = '<span class="pagination-info">第 ' + start + '-' + end + ' 组，共 ' + totalItems + ' 组，第 ' + page + '/' + Math.max(totalPages, 1) + ' 页</span>'
    + '<div class="pagination-actions">'
    + '<button class="page-btn"' + prevDisabled + ' onclick="changeHistoryPage(' + (page - 1) + ')">上一页</button>'
    + '<button class="page-btn"' + nextDisabled + ' onclick="changeHistoryPage(' + (page + 1) + ')">下一页</button>'
    + '</div>';
}

function changeHistoryPage(page) {
  const nextPage = Math.max(1, Number(page) || 1);
  if (nextPage === historyPage) return;
  historyPage = nextPage;
  fetchData();
}

function renderBranchCatalog() {
  const el = document.getElementById('branchCatalog');
  const keyword = catalogKeyword.toLowerCase();
  const rows = (BRANCH_CATALOG || []).filter(item => {
    if (!keyword) return true;
    return [item.name, item.code, item.address_cn, item.tel_no]
      .some(v => String(v || '').toLowerCase().includes(keyword));
  });
  if (activeTab === 'branches') {
    document.getElementById('summaryLeft').textContent = rows.length + ' 个分行';
  }
  if (rows.length === 0) {
    el.innerHTML = '<div class="placeholder">暂无分行数据</div>';
    return;
  }
  el.innerHTML = rows.map(item => {
    const badgeClass = item.is_enabled ? 'enabled' : 'disabled';
    const badgeText = item.is_enabled ? '启用' : '禁用';
    const mapUrl = buildMapUrl(item.name, item.address_cn || '');
    return '<div class="catalog-item"><div class="catalog-top"><div><div class="catalog-name">' + escapeHtml(item.name) + '</div><div class="catalog-code">' + escapeHtml(item.code) + '</div></div><span class="catalog-badge ' + badgeClass + '">' + badgeText + '</span></div><div class="catalog-meta">' + (item.address_cn ? ('<div>' + escapeHtml(item.address_cn) + '</div>') : '') + (item.tel_no ? ('<div>' + escapeHtml(item.tel_no) + '</div>') : '') + (item.updated_at ? ('<div>更新: ' + escapeHtml(item.updated_at) + '</div>') : '') + '</div><div class="catalog-actions"><a href="' + escapeHtml(mapUrl) + '" target="_blank" rel="noopener noreferrer">地图</a></div></div>';
  }).join('');
}

document.getElementById('branchSearch').addEventListener('input', function(e) {
  branchKeyword = e.target.value;
  renderTable();
});
document.getElementById('catalogSearch').addEventListener('input', function(e) {
  catalogKeyword = e.target.value;
  renderBranchCatalog();
});

fetchData();
refreshTimer = setInterval(fetchData, 10000);
</script>
</body>
</html>
